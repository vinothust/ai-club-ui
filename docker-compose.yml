# /var/www/ai-club-api/docker-compose.yml
#
# Full stack:
#   ai-club-api   — Node/Express API on port 3000 (internal)
#   ai-club-ui    — React SPA on port 80 (internal)
#   ai-club-nginx — Public-facing reverse proxy on host port 80
#
# Usage:
#   docker compose up -d --build
#   docker compose pull && docker compose up -d   (after registry push)

version: "3.9"

services:
  # ── Backend API ─────────────────────────────────────────────────────────────
  ai-club-api:
    image: ai-club-api:latest
    container_name: ai-club-api
    restart: unless-stopped
    build:
      context: .          # API repo root
    environment:
      NODE_ENV: production
      PORT: 3000
      # Add other API env vars here (DB_URL, JWT_SECRET, etc.)
    networks:
      - ai-club-net
    # NOT exposed to host — nginx proxies to it internally

  # ── React UI ────────────────────────────────────────────────────────────────
  ai-club-ui:
    image: ai-club-ui:latest
    container_name: ai-club-ui
    restart: unless-stopped
    build:
      context: /var/www/ai-club-ui    # path to this React repo on the server
      args:
        VITE_API_BASE_URL: /api       # relative path — nginx rewrites to API container
    networks:
      - ai-club-net
    # NOT exposed to host — nginx proxies to it internally

  # ── Reverse Proxy ───────────────────────────────────────────────────────────
  ai-club-nginx:
    image: nginx:1.27-alpine
    container_name: ai-club-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - ai-club-api
      - ai-club-ui
    networks:
      - ai-club-net

networks:
  ai-club-net:
    driver: bridge
