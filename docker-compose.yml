# /var/www/ai-club-ui/docker-compose.yml
#
# Runs ONLY the React UI container.
# The API and nginx reverse proxy are managed separately in /var/www/ai-club-api/.
#
# Usage:
#   docker compose up -d --build
#   docker compose up -d --build   (to rebuild after a code change)

version: "3.9"

services:
  ai-club-ui:
    image: ai-club-ui:latest
    container_name: ai-club-ui
    restart: unless-stopped
    build:
      context: .                      # this repo root
      args:
        VITE_API_BASE_URL: /api       # relative — nginx proxies /api to the API container
    networks:
      - ai-club-api_default           # same network as ai-club-nginx and ai-club-api
    # NOT exposed to host — the shared nginx proxies to this container internally

networks:
  ai-club-api_default:
    external: true                    # created by the API compose (ai-club-api_default)
