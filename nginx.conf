# /var/www/ai-club-api/nginx.conf
# Reverse proxy config for the public-facing ai-club-nginx container.
#
# Routing:
#   /api/*       → ai-club-api:3000  (REST API)
#   /api-docs/*  → ai-club-api:3000  (Swagger UI)
#   /*           → ai-club-ui:80     (React SPA)

server {
    listen 80;
    server_name _;          # matches bare IP: 10.100.242.71

    # ── Proxy timeouts ──────────────────────────────────────────────────────
    proxy_connect_timeout   60s;
    proxy_send_timeout      60s;
    proxy_read_timeout      60s;

    # ── Common proxy headers ─────────────────────────────────────────────────
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection        "";

    # ── REST API ─────────────────────────────────────────────────────────────
    location /api/ {
        proxy_pass http://ai-club-api:3000;
    }

    # ── Swagger / API Docs ───────────────────────────────────────────────────
    location /api-docs/ {
        proxy_pass http://ai-club-api:3000;
    }

    # ── React SPA (catch-all) ────────────────────────────────────────────────
    # All other requests go to the UI container; the UI container's own nginx
    # handles the SPA index.html fallback for client-side routing.
    location / {
        proxy_pass http://ai-club-ui:80;

        # Disable buffering for faster TTFB on HTML
        proxy_buffering off;
    }
}
